    <meta charset="UTF-8">

    <title>Endura | Log Workout</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <nav>

        <div class="logo">Endura</div>

        <button class="menu-toggle" id="menu-toggle">
            ☰
        </button>

        <ul id="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="plans.html">Workout Plans</a></li>

            <li><a href="progress.html">Progress</a></li>

        </ul>

    </nav>
</header>

<main>
    <section class="form-container">
        <h1>Log Workout</h1>

    <form>

        <label for="workout-name">Workout Name</label>
        <input type="text" id="workout-name" placeholder="Chest Day">

        <label for="exercise">Exercise</label>
        <input type="text" id="exercise" placeholder="Bench Press">

        <label for="sets">Sets</label>
        <input type="number" id="sets">

        <label for="reps">Reps</label>
        <input type="number" id="reps">

        <label for="weight">Weight (lbs)</label>
        <input type="number" id="weight">

        <button type="submit">Save Workout</button>

    </form>

</main>
