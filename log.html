<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <meta name="author" content="Danny Lane">
    <title>Endura | Log Workout</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <nav>

        <div class="logo">Endura</div>

        <button class="menu-toggle" id="menu-toggle">
            ☰
        </button>

        <ul id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="plans.html">Workout Plans</a></li>
            <li><a href="log.html">Log Workout</a></li>
            <li><a href="progress.html">Progress</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>

    </nav>
</header>

<main class="wide-page">

    <section class="form-container">
        <h1>Log Workout</h1>

        <form id="workoutForm">

        <label for="workoutName">Workout Name</label>
        <input type="text" id="workoutName" required>

        <label for="workoutDate">Date</label>
        <input type="date" id="workoutDate">

        <label for="notes">Notes (Optional)</label>
        <textarea id="notes" rows="3"></textarea>

        <h2>Create Exercise(s)</h2>

        <div id="exerciseList"></div>

        <div class="form-actions">
        <button type="button" id="addExercise" class="btn">
            + Add Exercise
        </button>

        <button type="submit" class="btn">
            Save Workout
        </button>
        </div>

        </form>
    </section>
</main>


<footer>
    <p>&copy; 2026 Endura. All Rights Reserved. Code Created By Danny Lane</p>
</footer>

<script>
const menuToggle = document.getElementById("menu-toggle");
const navLinks = document.getElementById("nav-links");

menuToggle.addEventListener("click", () => {
    navLinks.classList.toggle("active");
});
</script>

<script>

const exerciseList = document.getElementById("exerciseList");
const addExerciseBtn = document.getElementById("addExercise");

function createExercise(){

    const card = document.createElement("div");
    card.className = "exercise-card";

    card.innerHTML = `

        <h3>Exercise</h3>

        <label>Exercise Name</label>
        <input type="text" class="exercise-name">

        <div class="exercise-row">

            <div>
                <label>Sets</label>
                <input type="number" class="sets">
            </div>

            <div>
                <label>Reps</label>
                <input type="number" class="reps">
            </div>

            <div>
                <label>Weight</label>
                <input type="number" class="weight">
            </div>

        </div>

        <button
            type="button"
            class="removeExercise">

            Remove Exercise

        </button>

    `;

    card.querySelector(".removeExercise")
        .addEventListener("click", () => {
            card.remove();
        });

    exerciseList.appendChild(card);

}

addExerciseBtn.addEventListener("click", createExercise);

createExercise();

</script>

</body>
</html>
